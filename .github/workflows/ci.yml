name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck & tests unitaires
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Vérifier les types
        run: npm run typecheck

      - name: Tests unitaires (Vitest)
        run: npm run test

  e2e:
    name: Build & smoke E2E
    runs-on: windows-latest
    timeout-minutes: 20
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Builder l'application
        run: npm run build

      - name: Smoke test Electron (Playwright)
        run: npm run test:e2e
